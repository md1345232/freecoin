<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Coin Transfer - Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --tt-pink: #fe2c55;
            --tt-black: #010101;
            --coin-gold: #fac637;
            --success-green: #22c55e;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-mockup {
            width: 375px;
            height: 720px;
            background: var(--tt-black);
            border-radius: 45px;
            border: 10px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(254, 44, 85, 0.2);
        }

        /* --- GLOBAL SCREEN SETUP --- */
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            background: var(--tt-black);
            box-sizing: border-box;
        }

        .active-screen { display: flex !important; }

        /* --- HEADER --- */
        .header {
            padding: 50px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .balance-pill {
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .coin-icon {
            width: 20px;
            height: 20px;
            background: var(--coin-gold);
            border-radius: 50%;
            border: 2px solid #fff0a5;
            box-shadow: 0 0 5px var(--coin-gold);
        }

        #total-balance {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* --- MAIN UI --- */
        .main-body {
            flex: 1;
            padding: 0 30px;
            text-align: center;
        }

        .coin-hero {
            width: 130px;
            height: 130px;
            background: var(--coin-gold);
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: inset -5px -8px 20px rgba(0,0,0,0.4), inset 5px 8px 20px #fff0a5, 0 15px 30px rgba(0,0,0,0.5);
            animation: rotate3d 5s infinite linear;
        }

        @keyframes rotate3d { 100% { transform: rotateY(360deg); } }

        .input-area { margin-top: 20px; }
        
        .tt-input {
            width: 100%;
            background: #1a1a1a;
            border: 2px solid #222;
            border-radius: 15px;
            padding: 20px;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .tt-input:focus { border-color: var(--tt-pink); background: #222; }

        .send-btn {
            background: var(--tt-pink);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px;
            width: 85%;
            margin: 30px auto;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 25px rgba(254, 44, 85, 0.4);
        }

        .send-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* --- OVERLAYS --- */
        .overlay {
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        .loader-ring {
            width: 70px;
            height: 70px;
            border: 5px solid #222;
            border-top: 5px solid var(--tt-pink);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .success-icon {
            width: 110px;
            height: 110px;
            background: var(--success-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 55px;
            margin-bottom: 25px;
            animation: popCheck 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popCheck { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .receipt-card {
            background: #111;
            width: 85%;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="phone-mockup">
    
    <!-- HEADER (Visible on Main and Success) -->
    <div class="header" id="app-header">
        <i class="fas fa-chevron-left"></i>
        <div class="balance-pill">
            <div class="coin-icon"></div>
            <span id="total-balance">1,000,000</span>
        </div>
        <i class="fas fa-ellipsis-h"></i>
    </div>

    <!-- 1. MAIN SCREEN -->
    <div id="screen-main" class="screen active-screen">
        <div class="main-body">
            <h1 style="margin-top: 20px; font-weight: 900;">Send Gift</h1>
            <div class="coin-hero"><i class="fab fa-tiktok" style="opacity: 0.3; color: black;"></i></div>
            
            <div class="input-area">
                <input type="text" id="target-id" class="tt-input" placeholder="@username_id">
                <div style="margin-top: 20px;">
                    <span style="color: #666; font-size: 0.9rem;">AMOUNT TO SEND</span>
                    <h2 style="font-size: 3rem; margin: 10px 0; font-weight: 900; color: var(--coin-gold);">50,000</h2>
                </div>
            </div>
        </div>
        <button class="send-btn" onclick="startTransaction()">SEND NOW</button>
    </div>

    <!-- 2. PROCESSING SCREEN -->
    <div id="screen-proc" class="screen overlay">
        <div class="loader-ring"></div>
        <h2 style="margin-top: 30px; letter-spacing: 2px;">ENCRYPTING...</h2>
        <p id="log-feed" style="color: var(--tt-pink); font-family: monospace;">Accessing secure vault...</p>
    </div>

    <!-- 3. SUCCESS SCREEN -->
    <div id="screen-success" class="screen overlay">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h1 style="margin-bottom: 5px;">Sent!</h1>
        <p style="color: #888; margin-top: 0;">Transfer was successful.</p>
        
        <div class="receipt-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span style="color:#666;">Recipient</span>
                <span id="final-user" style="font-weight:700;">--</span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <span style="color:#666;">Amount</span>
                <span style="font-weight:700; color:var(--coin-gold);">50,000</span>
            </div>
        </div>
        
        <button class="send-btn" style="background: #222; box-shadow: none;" onclick="resetToMain()">DONE</button>
    </div>

</div>

<script>
    let currentBalance = 1000000;
    const sendAmount = 50000;

    function navigate(screenId) {
        // Hide all screens
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        // Show selected screen
        document.getElementById(screenId).classList.add('active-screen');
    }

    function startTransaction() {
        const user = document.getElementById('target-id').value;
        if(!user) return alert("Please enter a username");

        document.getElementById('final-user').innerText = user;
        
        // Hide header during processing to look more professional
        document.getElementById('app-header').style.opacity = "0";
        navigate('screen-proc');

        const logs = ["Connecting to server...", "Authorizing 50,000 coins...", "Bypassing protocols...", "Success!"];
        let i = 0;
        
        const logTimer = setInterval(() => {
            if(i < logs.length) {
                document.getElementById('log-feed').innerText = logs[i];
                i++;
            } else {
                clearInterval(logTimer);
                showSuccess();
            }
        }, 1200);
    }

    function showSuccess() {
        navigate('screen-success');
        document.getElementById('app-header').style.opacity = "1";
        
        // Animate the balance deduction
        let targetBalance = currentBalance - sendAmount;
        let counter = setInterval(() => {
            if(currentBalance <= targetBalance) {
                clearInterval(counter);
                currentBalance = targetBalance;
                document.getElementById('total-balance').innerText = currentBalance.toLocaleString();
            } else {
                currentBalance -= 1000;
                document.getElementById('total-balance').innerText = currentBalance.toLocaleString();
            }
        }, 20);
    }

    function resetToMain() {
        document.getElementById('target-id').value = "";
        navigate('screen-main');
    }
</script>

</body>
</html>
